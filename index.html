<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX Property KPI Dashboard - Live</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1f2937;
            --secondary: #3b82f6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --light: #f3f4f6;
            --border: #e5e7eb;
            --text: #111827;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: var(--text);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header-left h1 {
            font-size: 28px;
            margin-bottom: 8px;
            color: var(--primary);
        }

        .header-left p {
            color: #6b7280;
            font-size: 14px;
        }

        .header-right {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            background: #d1fae5;
            color: #065f46;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
        }

        .status-badge.updating {
            background: #fef3c7;
            color: #92400e;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: currentColor;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .refresh-btn {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .refresh-btn:hover {
            background: #2563eb;
        }

        .scorecard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .kpi-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-left: 4px solid var(--secondary);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .kpi-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }

        .kpi-card.status-good {
            border-left-color: var(--success);
        }

        .kpi-card.status-warning {
            border-left-color: var(--warning);
        }

        .kpi-card.status-danger {
            border-left-color: var(--danger);
        }

        .kpi-label {
            font-size: 13px;
            color: #6b7280;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .kpi-value {
            font-size: 36px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 12px;
        }

        .kpi-target {
            font-size: 12px;
            color: #9ca3af;
            margin-bottom: 15px;
        }

        .kpi-bar {
            height: 6px;
            background: var(--light);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .kpi-bar-fill {
            height: 100%;
            background: var(--success);
            transition: width 0.5s ease;
        }

        .kpi-stats {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #6b7280;
        }

        .properties-section {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow-x: auto;
        }

        .properties-section h2 {
            font-size: 20px;
            margin-bottom: 20px;
            color: var(--primary);
        }

        .properties-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .properties-table thead {
            background: var(--light);
            border-bottom: 2px solid var(--border);
        }

        .properties-table th {
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: var(--primary);
            white-space: nowrap;
        }

        .properties-table td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }

        .properties-table tbody tr:hover {
            background: var(--light);
        }

        .property-name {
            font-weight: 500;
            color: var(--secondary);
        }

        .data-placeholder {
            text-align: center;
            padding: 40px;
            color: #9ca3af;
        }

        .spinner {
            border: 3px solid var(--light);
            border-top: 3px solid var(--secondary);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            border-left: 4px solid var(--danger);
        }

        @media (max-width: 768px) {
            .scorecard {
                grid-template-columns: 1fr;
            }

            .header {
                flex-direction: column;
            }

            .kpi-value {
                font-size: 28px;
            }

            .properties-table {
                font-size: 11px;
            }

            .properties-table th,
            .properties-table td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <h1>🏢 APEX Property Portfolio Dashboard</h1>
                <p id="lastUpdate">Loading data...</p>
            </div>
            <div class="header-right">
                <div id="statusBadge" class="status-badge">
                    <span class="dot"></span>
                    <span>Live</span>
                </div>
                <button class="refresh-btn" onclick="refreshData()">↻ Refresh</button>
            </div>
        </div>

        <div id="errorContainer"></div>

        <div id="scorecard" class="scorecard">
            <div class="data-placeholder">
                <div class="spinner"></div>
                <p>Loading KPI data...</p>
            </div>
        </div>

        <div class="properties-section">
            <h2>Property Performance Details</h2>
            <div id="propertiesTable"></div>
        </div>
    </div>

    <script>
        // ⚠️ UPDATE THIS URL WITH YOUR GOOGLE SHEETS CSV EXPORT URL
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTTodaoBqISV0s84L0I2WGyBKQxIETQ65EasIemEO8gvlyi1HbRzIROvnSLspiUY1iz-VoTxPwuA4cV/pub?gid=1530873949&single=true&output=csv';

        let dashboardData = {
            kpis: [],
            properties: [],
            timestamp: null
        };

        // Initialize dashboard
        document.addEventListener('DOMContentLoaded', function() {
            loadData();
            // Auto-refresh every 60 seconds
            setInterval(loadData, 60000);
        });

        async function loadData() {
            try {
                updateStatus('updating');
                const response = await fetch(CSV_URL);

                if (!response.ok) {
                    throw new Error(`Failed to fetch data: ${response.status}`);
                }

                const csvText = await response.text();
                parseCSVData(csvText);
                renderDashboard();
                updateStatus('live');
                clearError();
            } catch (error) {
                console.error('Error loading data:', error);
                showError('Failed to load data from Google Sheets: ' + error.message);
                updateStatus('error');
            }
        }

        function parseCSVData(csv) {
            const lines = csv.trim().split('\n');
            dashboardData.timestamp = new Date();

            // Parse Portfolio Scorecard (rows 6-12)
            const kpiStartRow = 7;
            const kpiEndRow = 12;

            dashboardData.kpis = [];
            for (let i = kpiStartRow; i < Math.min(kpiEndRow + 1, lines.length); i++) {
                const row = parseCSVLine(lines[i]);
                if (row.length > 1 && row[0].trim()) {
                    dashboardData.kpis.push({
                        name: row[0].trim(),
                        thisWeek: parseFloat(row[2]) || 0,
                        target: parseFloat(row[3]) || 0,
                        status: row[4] ? row[4].trim() : '—',
                        avg4week: parseFloat(row[5]) || 0,
                        belowTarget: parseInt(row[6]) || 0
                    });
                }
            }

            // Parse Property Details (rows 15+)
            dashboardData.properties = [];
            const propertyStartRow = 15;
            for (let i = propertyStartRow; i < lines.length; i++) {
                const row = parseCSVLine(lines[i]);
                if (row.length > 2 && row[0].trim() && row[0].includes('Property')) {
                    dashboardData.properties.push({
                        name: row[0].trim(),
                        occupancy: parseFloat(row[1]) || 0,
                        collection: parseFloat(row[2]) || 0,
                        woOnTime: parseFloat(row[3]) || 0,
                        turnaround: parseFloat(row[4]) || 0,
                        rgiOnTime: parseFloat(row[5]) || 0,
                        kpisMet: parseInt(row[6]) || 0,
                        entries: parseInt(row[7]) || 0
                    });
                }
            }
        }

        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let insideQuotes = false;

            for (let i = 0; i < line.length; i++) {
                const char = line[i];

                if (char === '"') {
                    insideQuotes = !insideQuotes;
                } else if (char === ',' && !insideQuotes) {
                    result.push(current);
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current);
            return result;
        }

        function getStatus(value, target, inverse = false) {
            if (!value || !target) return 'warning';
            const percentage = inverse ? (target / value) * 100 : (value / target) * 100;
            if (percentage >= 95) return 'good';
            if (percentage >= 85) return 'warning';
            return 'danger';
        }

        function renderDashboard() {
            renderKPIs();
            renderPropertiesTable();
        }

        function renderKPIs() {
            const scorecard = document.getElementById('scorecard');

            if (dashboardData.kpis.length === 0) {
                scorecard.innerHTML = '<div class="data-placeholder"><p>No KPI data available yet. Please enter data in your Google Sheet.</p></div>';
                return;
            }

            scorecard.innerHTML = dashboardData.kpis.map(kpi => {
                // Determine unit and inverse status
                const isTimeMetric = kpi.name.includes('Turnaround');
                const unit = isTimeMetric ? ' days' : '%';
                const status = getStatus(kpi.thisWeek, kpi.target, isTimeMetric);

                // Calculate percentage for bar fill
                const percentage = isTimeMetric ?
                    Math.min(100, (kpi.target / kpi.thisWeek) * 100) :
                    Math.min(100, (kpi.thisWeek / kpi.target) * 100);

                return `
                    <div class="kpi-card status-${status}">
                        <div class="kpi-label">${kpi.name}</div>
                        <div class="kpi-value">${kpi.thisWeek.toFixed(1)}${unit}</div>
                        <div class="kpi-target">Target: ${kpi.target}${unit}</div>
                        <div class="kpi-bar">
                            <div class="kpi-bar-fill" style="width: ${percentage}%"></div>
                        </div>
                        <div class="kpi-stats">
                            <span>This Week: ${kpi.thisWeek}${unit}</span>
                            <span>4-Wk Avg: ${kpi.avg4week}${unit}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderPropertiesTable() {
            const container = document.getElementById('propertiesTable');

            if (dashboardData.properties.length === 0) {
                container.innerHTML = '<p class="data-placeholder">No property data available yet.</p>';
                return;
            }

            const html = `
                <table class="properties-table">
                    <thead>
                        <tr>
                            <th>Property</th>
                            <th>Occupancy %</th>
                            <th>Collection %</th>
                            <th>WO On-Time %</th>
                            <th>Turnaround (days)</th>
                            <th>RGI On-Time %</th>
                            <th>KPIs Met</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${dashboardData.properties.map(prop => {
                            const kpisMetStatus = prop.kpisMet >= 4 ? 'good' : prop.kpisMet >= 3 ? 'warning' : 'danger';
                            const statusText = prop.kpisMet >= 4 ? 'On Track' : prop.kpisMet >= 3 ? 'At Risk' : 'Below Target';
                            return `
                                <tr>
                                    <td><span class="property-name">${prop.name}</span></td>
                                    <td>${prop.occupancy > 0 ? prop.occupancy.toFixed(1) + '%' : '—'}</td>
                                    <td>${prop.collection > 0 ? prop.collection.toFixed(1) + '%' : '—'}</td>
                                    <td>${prop.woOnTime > 0 ? prop.woOnTime.toFixed(1) + '%' : '—'}</td>
                                    <td>${prop.turnaround > 0 ? prop.turnaround : '—'}</td>
                                    <td>${prop.rgiOnTime > 0 ? prop.rgiOnTime.toFixed(1) + '%' : '—'}</td>
                                    <td><strong>${prop.kpisMet}/5</strong></td>
                                    <td><span class="status-badge ${kpisMetStatus}">${statusText}</span></td>
                                </tr>
                            `;
                        }).join('')}
                    </tbody>
                </table>
            `;

            container.innerHTML = html;
        }

        function updateStatus(status) {
            const badge = document.getElementById('statusBadge');
            if (status === 'updating') {
                badge.classList.add('updating');
                badge.innerHTML = '<span class="dot"></span><span>Updating...</span>';
            } else if (status === 'live') {
                badge.classList.remove('updating');
                badge.innerHTML = '<span class="dot"></span><span>Live</span>';
            } else if (status === 'error') {
                badge.classList.add('updating');
                badge.innerHTML = '<span class="dot"></span><span>Error</span>';
            }
        }

        function showError(message) {
            const container = document.getElementById('errorContainer');
            container.innerHTML = `<div class="error">${message}</div>`;
        }

        function clearError() {
            document.getElementById('errorContainer').innerHTML = '';
        }

        function refreshData() {
            loadData();
        }

        // Update last update time
        setInterval(() => {
            if (dashboardData.timestamp) {
                const now = new Date();
                const diff = Math.floor((now - dashboardData.timestamp) / 1000);
                let timeText = '';

                if (diff < 60) timeText = 'just now';
                else if (diff < 3600) timeText = Math.floor(diff / 60) + 'm ago';
                else if (diff < 86400) timeText = Math.floor(diff / 3600) + 'h ago';
                else timeText = Math.floor(diff / 86400) + 'd ago';

                document.getElementById('lastUpdate').textContent = 'Last updated: ' + timeText;
            }
        }, 1000);
    </script>
</body>
</html>
