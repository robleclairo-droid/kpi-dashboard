<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX Property KPI Dashboard - Live</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1f2937;
            --secondary: #3b82f6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --light: #f3f4f6;
            --border: #e5e7eb;
            --text: #111827;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: var(--text);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header-left h1 {
            font-size: 28px;
            margin-bottom: 8px;
            color: var(--primary);
        }

        .header-left p {
            color: #6b7280;
            font-size: 14px;
        }

        .header-right {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .week-picker {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .week-picker label {
            font-size: 13px;
            font-weight: 500;
            color: var(--primary);
        }

        .week-picker select {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            background: white;
            color: var(--text);
            cursor: pointer;
            min-width: 150px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            background: #d1fae5;
            color: #065f46;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
        }

        .status-badge.updating {
            background: #fef3c7;
            color: #92400e;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: currentColor;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .refresh-btn {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .refresh-btn:hover {
            background: #2563eb;
        }

        .reporting-line {
            margin-bottom: 20px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        .scorecard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .kpi-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-left: 4px solid var(--secondary);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .kpi-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }

        .kpi-card.status-good {
            border-left-color: var(--success);
        }

        .kpi-card.status-warning {
            border-left-color: var(--warning);
        }

        .kpi-card.status-danger {
            border-left-color: var(--danger);
        }

        .kpi-label {
            font-size: 13px;
            color: #6b7280;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .kpi-value {
            font-size: 36px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 12px;
        }

        .kpi-target {
            font-size: 12px;
            color: #9ca3af;
            margin-bottom: 15px;
        }

        .kpi-bar {
            height: 6px;
            background: var(--light);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .kpi-bar-fill {
            height: 100%;
            background: var(--success);
            transition: width 0.5s ease;
        }

        .kpi-stats {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #6b7280;
        }

        .properties-section {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow-x: auto;
        }

        .properties-section h2 {
            font-size: 20px;
            margin-bottom: 20px;
            color: var(--primary);
        }

        .properties-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .properties-table thead {
            background: var(--light);
            border-bottom: 2px solid var(--border);
        }

        .properties-table th {
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: var(--primary);
            white-space: nowrap;
        }

        .properties-table td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }

        .properties-table tbody tr:hover {
            background: var(--light);
        }

        .property-name {
            font-weight: 500;
            color: var(--secondary);
        }

        .data-placeholder {
            text-align: center;
            padding: 40px;
            color: #9ca3af;
        }

        .spinner {
            border: 3px solid var(--light);
            border-top: 3px solid var(--secondary);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            border-left: 4px solid var(--danger);
        }

        @media (max-width: 768px) {
            .scorecard {
                grid-template-columns: 1fr;
            }

            .header {
                flex-direction: column;
            }

            .kpi-value {
                font-size: 28px;
            }

            .properties-table {
                font-size: 11px;
            }

            .properties-table th,
            .properties-table td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <h1>🏢 APEX Property Portfolio Dashboard</h1>
                <p id="lastUpdate">Loading data...</p>
            </div>
            <div class="header-right">
                <div class="week-picker">
                    <label for="weekSelect">Week Ending:</label>
                    <select id="weekSelect" onchange="onWeekChange()"></select>
                </div>
                <div id="statusBadge" class="status-badge">
                    <span class="dot"></span>
                    <span>Live</span>
                </div>
                <button class="refresh-btn" onclick="refreshData()">↻ Refresh</button>
            </div>
        </div>

        <div id="errorContainer"></div>

        <p id="reportingLine" class="reporting-line"></p>

        <div id="scorecard" class="scorecard">
            <div class="data-placeholder">
                <div class="spinner"></div>
                <p>Loading KPI data...</p>
            </div>
        </div>

        <div class="properties-section">
            <h2>Property Performance Details</h2>
            <div id="propertiesTable"></div>
        </div>
    </div>

    <script>
        // Both tabs published from the same Google Sheet (File > Share > Publish to web > CSV)
        const SETUP_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTTodaoBqISV0s84L0I2WGyBKQxIETQ65EasIemEO8gvlyi1HbRzIROvnSLspiUY1iz-VoTxPwuA4cV/pub?gid=1341792371&single=true&output=csv';
        const ENTRY_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTTodaoBqISV0s84L0I2WGyBKQxIETQ65EasIemEO8gvlyi1HbRzIROvnSLspiUY1iz-VoTxPwuA4cV/pub?gid=648611558&single=true&output=csv';

        const KPI_DEFS = [
            { key: 'occupancy', name: 'Occupancy Rate', targetName: 'Occupancy Rate', inverse: false, unit: '%' },
            { key: 'collection', name: 'Rent Collection Rate', targetName: 'Rent Collection Rate', inverse: false, unit: '%' },
            { key: 'woOnTime', name: 'Work Orders Closed On Time', targetName: 'Work Orders Closed On Time', inverse: false, unit: '%' },
            { key: 'turnaround', name: 'Avg Unit Turnaround (days)', targetName: 'Avg Unit Turnaround (days)', inverse: true, unit: ' days' },
            { key: 'rgiOnTime', name: 'RGI Reviews Completed On Time', targetName: 'RGI Reviews Completed On Time', inverse: false, unit: '%' }
        ];

        let properties = [];       // [{id, name, totalUnits}]
        let targets = {};          // { 'Occupancy Rate': 97, ... }
        let entriesByWeek = new Map(); // week -> [rawRow]
        let weeksSorted = [];      // descending, most recent first
        let selectedWeek = null;
        let lastLoadTime = null;

        document.addEventListener('DOMContentLoaded', function() {
            loadData();
            setInterval(loadData, 60000);
        });

        async function loadData() {
            try {
                updateStatus('updating');
                const [setupText, entryText] = await Promise.all([
                    fetchCsv(SETUP_CSV_URL),
                    fetchCsv(ENTRY_CSV_URL)
                ]);

                parseSetup(setupText);
                parseEntries(entryText);

                const previousSelection = selectedWeek;
                populateWeekSelect();

                // Preserve the user's selection across refreshes if it still exists, else default to latest
                if (previousSelection && weeksSorted.includes(previousSelection)) {
                    selectedWeek = previousSelection;
                    document.getElementById('weekSelect').value = selectedWeek;
                } else {
                    selectedWeek = weeksSorted[0] || null;
                }

                renderDashboard();
                updateStatus('live');
                clearError();
                lastLoadTime = new Date();
            } catch (error) {
                console.error('Error loading data:', error);
                showError('Failed to load data from Google Sheets: ' + error.message);
                updateStatus('error');
            }
        }

        async function fetchCsv(url) {
            const response = await fetch(url);
            if (!response.ok) {
                throw new Error(`Failed to fetch data: ${response.status}`);
            }
            return response.text();
        }

        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let insideQuotes = false;

            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') {
                    insideQuotes = !insideQuotes;
                } else if (char === ',' && !insideQuotes) {
                    result.push(current);
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current);
            return result;
        }

        function toNumber(str) {
            if (str === undefined || str === null) return NaN;
            const cleaned = String(str).replace(/[$,%\s]/g, '');
            if (cleaned === '') return NaN;
            return parseFloat(cleaned);
        }

        // Setup tab: Property List in columns A-D, KPI Targets in columns F-H
        function parseSetup(csv) {
            const lines = csv.trim().split('\n');
            const newProperties = [];
            const newTargets = {};

            for (let i = 0; i < lines.length; i++) {
                const row = parseCSVLine(lines[i]);
                // Property List rows: Property ID (P##), Property Name, Total Units, Property Manager
                if (row[0] && /^P\d+/.test(row[0].trim())) {
                    const totalUnits = toNumber(row[2]);
                    if (row[1] && row[1].trim() && !isNaN(totalUnits)) {
                        newProperties.push({
                            id: row[0].trim(),
                            name: row[1].trim(),
                            totalUnits: totalUnits
                        });
                    }
                }
                // KPI Targets rows: KPI name in col F (idx 5), Target in col G (idx 6)
                if (row[5] && row[5].trim() && KPI_DEFS.some(k => k.targetName === row[5].trim())) {
                    const targetVal = toNumber(row[6]);
                    if (!isNaN(targetVal)) {
                        newTargets[row[5].trim()] = targetVal;
                    }
                }
            }

            properties = newProperties;
            targets = newTargets;
        }

        // Weekly Entry tab: Week Ending, Property, Units Occupied, Rent Charged, Rent Collected,
        // Work Orders Due, WOs Closed On Time, Avg Turnaround (days), RGI Reviews Due, RGI Reviews Done
        function parseEntries(csv) {
            const lines = csv.trim().split('\n');
            const newMap = new Map();

            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const row = parseCSVLine(lines[i]);
                const week = row[0] ? row[0].trim() : '';
                const property = row[1] ? row[1].trim() : '';
                if (!week || !property) continue;

                const entry = {
                    week,
                    property,
                    unitsOccupied: toNumber(row[2]),
                    rentCharged: toNumber(row[3]),
                    rentCollected: toNumber(row[4]),
                    woDue: toNumber(row[5]),
                    woClosedOnTime: toNumber(row[6]),
                    avgTurnaround: toNumber(row[7]),
                    rgiDue: toNumber(row[8]),
                    rgiDone: toNumber(row[9])
                };

                if (!newMap.has(week)) newMap.set(week, []);
                newMap.get(week).push(entry);
            }

            entriesByWeek = newMap;
            weeksSorted = Array.from(newMap.keys()).sort().reverse();
        }

        function populateWeekSelect() {
            const select = document.getElementById('weekSelect');
            select.innerHTML = weeksSorted.map(w => `<option value="${w}">${w}</option>`).join('');
        }

        function onWeekChange() {
            selectedWeek = document.getElementById('weekSelect').value;
            renderDashboard();
        }

        function refreshData() {
            loadData();
        }

        // Compute per-property metrics for a single raw entry row
        function computePropertyMetrics(entry) {
            const prop = properties.find(p => p.name === entry.property);
            const totalUnits = prop ? prop.totalUnits : NaN;

            const occupancy = (!isNaN(totalUnits) && totalUnits > 0 && !isNaN(entry.unitsOccupied))
                ? (entry.unitsOccupied / totalUnits) * 100 : NaN;
            const collection = (!isNaN(entry.rentCharged) && entry.rentCharged > 0 && !isNaN(entry.rentCollected))
                ? (entry.rentCollected / entry.rentCharged) * 100 : NaN;
            const woOnTime = (!isNaN(entry.woDue) && entry.woDue > 0 && !isNaN(entry.woClosedOnTime))
                ? (entry.woClosedOnTime / entry.woDue) * 100 : NaN;
            const turnaround = !isNaN(entry.avgTurnaround) ? entry.avgTurnaround : NaN;
            const rgiOnTime = (!isNaN(entry.rgiDue) && entry.rgiDue > 0 && !isNaN(entry.rgiDone))
                ? (entry.rgiDone / entry.rgiDue) * 100 : NaN;

            const metrics = { occupancy, collection, woOnTime, turnaround, rgiOnTime };

            let kpisMet = 0;
            KPI_DEFS.forEach(def => {
                const val = metrics[def.key];
                const target = targets[def.targetName];
                if (isNaN(val) || target === undefined) return;
                const meets = def.inverse ? val <= target : val >= target;
                if (meets) kpisMet++;
            });

            return { ...metrics, kpisMet };
        }

        // Aggregate portfolio-wide KPI values for a given week (weighted where applicable)
        function computeWeekAggregate(week) {
            const rows = entriesByWeek.get(week) || [];
            let occNum = 0, occDen = 0;
            let colNum = 0, colDen = 0;
            let woNum = 0, woDen = 0;
            let rgiNum = 0, rgiDen = 0;
            let turnSum = 0, turnCount = 0;

            rows.forEach(entry => {
                const prop = properties.find(p => p.name === entry.property);
                const totalUnits = prop ? prop.totalUnits : NaN;

                if (!isNaN(totalUnits) && !isNaN(entry.unitsOccupied)) {
                    occNum += entry.unitsOccupied;
                    occDen += totalUnits;
                }
                if (!isNaN(entry.rentCharged) && !isNaN(entry.rentCollected)) {
                    colNum += entry.rentCollected;
                    colDen += entry.rentCharged;
                }
                if (!isNaN(entry.woDue) && !isNaN(entry.woClosedOnTime)) {
                    woNum += entry.woClosedOnTime;
                    woDen += entry.woDue;
                }
                if (!isNaN(entry.rgiDue) && !isNaN(entry.rgiDone)) {
                    rgiNum += entry.rgiDone;
                    rgiDen += entry.rgiDue;
                }
                if (!isNaN(entry.avgTurnaround)) {
                    turnSum += entry.avgTurnaround;
                    turnCount++;
                }
            });

            return {
                occupancy: occDen > 0 ? (occNum / occDen) * 100 : NaN,
                collection: colDen > 0 ? (colNum / colDen) * 100 : NaN,
                woOnTime: woDen > 0 ? (woNum / woDen) * 100 : NaN,
                turnaround: turnCount > 0 ? turnSum / turnCount : NaN,
                rgiOnTime: rgiDen > 0 ? (rgiNum / rgiDen) * 100 : NaN,
                reportCount: rows.length
            };
        }

        // Trailing 4-week average (the selected week plus up to 3 prior weeks that have data)
        function computeTrailingAverage(week) {
            const idx = weeksSorted.indexOf(week);
            if (idx === -1) return {};
            const windowWeeks = weeksSorted.slice(idx, idx + 4);
            const sums = { occupancy: [], collection: [], woOnTime: [], turnaround: [], rgiOnTime: [] };

            windowWeeks.forEach(w => {
                const agg = computeWeekAggregate(w);
                Object.keys(sums).forEach(key => {
                    if (!isNaN(agg[key])) sums[key].push(agg[key]);
                });
            });

            const avg = {};
            Object.keys(sums).forEach(key => {
                avg[key] = sums[key].length > 0 ? sums[key].reduce((a, b) => a + b, 0) / sums[key].length : NaN;
            });
            return avg;
        }

        function countBelowTarget(week, kpiKey, def) {
            const rows = entriesByWeek.get(week) || [];
            let count = 0;
            rows.forEach(entry => {
                const metrics = computePropertyMetrics(entry);
                const val = metrics[kpiKey];
                const target = targets[def.targetName];
                if (isNaN(val) || target === undefined) return;
                const meets = def.inverse ? val <= target : val >= target;
                if (!meets) count++;
            });
            return count;
        }

        function getStatus(value, target, inverse) {
            if (isNaN(value) || target === undefined) return 'warning';
            const percentage = inverse ? (target / value) * 100 : (value / target) * 100;
            if (percentage >= 100) return 'good';
            if (percentage >= 90) return 'warning';
            return 'danger';
        }

        function renderDashboard() {
            renderReportingLine();
            renderKPIs();
            renderPropertiesTable();
        }

        function renderReportingLine() {
            const line = document.getElementById('reportingLine');
            if (!selectedWeek) {
                line.textContent = '';
                return;
            }
            const rows = entriesByWeek.get(selectedWeek) || [];
            const reportingCount = new Set(rows.map(r => r.property)).size;
            line.textContent = `Week Ending ${selectedWeek} · ${reportingCount} of ${properties.length} properties reporting`;
        }

        function renderKPIs() {
            const scorecard = document.getElementById('scorecard');

            if (!selectedWeek || weeksSorted.length === 0) {
                scorecard.innerHTML = '<div class="data-placeholder"><p>No weekly data available yet. Please enter data in your Google Sheet.</p></div>';
                return;
            }

            const agg = computeWeekAggregate(selectedWeek);
            const trailing = computeTrailingAverage(selectedWeek);

            scorecard.innerHTML = KPI_DEFS.map(def => {
                const value = agg[def.key];
                const target = targets[def.targetName];
                const hasData = !isNaN(value);

                if (!hasData) {
                    return `
                        <div class="kpi-card">
                            <div class="kpi-label">${def.name}</div>
                            <div class="kpi-value">—</div>
                            <div class="kpi-target">Target: ${target !== undefined ? target + def.unit : '—'}</div>
                            <div class="kpi-bar"><div class="kpi-bar-fill" style="width: 0%"></div></div>
                            <div class="kpi-stats">
                                <span>This Week: —</span>
                                <span>4-Wk Avg: —</span>
                            </div>
                        </div>
                    `;
                }

                const status = getStatus(value, target, def.inverse);
                const percentage = def.inverse
                    ? Math.min(100, (target / value) * 100)
                    : Math.min(100, (value / target) * 100);
                const trailingVal = trailing[def.key];
                const belowTarget = countBelowTarget(selectedWeek, def.key, def);

                return `
                    <div class="kpi-card status-${status}">
                        <div class="kpi-label">${def.name}</div>
                        <div class="kpi-value">${value.toFixed(1)}${def.unit}</div>
                        <div class="kpi-target">Target: ${target !== undefined ? target + def.unit : '—'}</div>
                        <div class="kpi-bar"><div class="kpi-bar-fill" style="width: ${percentage}%"></div></div>
                        <div class="kpi-stats">
                            <span>This Week: ${value.toFixed(1)}${def.unit}</span>
                            <span>4-Wk Avg: ${!isNaN(trailingVal) ? trailingVal.toFixed(1) + def.unit : '—'}</span>
                        </div>
                        <div class="kpi-stats" style="margin-top:6px;">
                            <span>${belowTarget} ${belowTarget === 1 ? 'property' : 'properties'} below target</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderPropertiesTable() {
            const container = document.getElementById('propertiesTable');

            if (properties.length === 0) {
                container.innerHTML = '<p class="data-placeholder">No property data available yet.</p>';
                return;
            }

            const rows = selectedWeek ? (entriesByWeek.get(selectedWeek) || []) : [];
            const entryByProperty = new Map(rows.map(r => [r.property, r]));

            const html = `
                <table class="properties-table">
                    <thead>
                        <tr>
                            <th>Property</th>
                            <th>Occupancy %</th>
                            <th>Collection %</th>
                            <th>WO On-Time %</th>
                            <th>Turnaround (days)</th>
                            <th>RGI On-Time %</th>
                            <th>KPIs Met</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${properties.map(prop => {
                            const entry = entryByProperty.get(prop.name);
                            if (!entry) {
                                return `
                                    <tr>
                                        <td><span class="property-name">${prop.name}</span></td>
                                        <td>—</td><td>—</td><td>—</td><td>—</td><td>—</td>
                                        <td><strong>0/5</strong></td>
                                        <td><span class="status-badge danger">No Entry</span></td>
                                    </tr>
                                `;
                            }
                            const m = computePropertyMetrics(entry);
                            const kpisMetStatus = m.kpisMet >= 4 ? 'good' : m.kpisMet >= 3 ? 'warning' : 'danger';
                            const statusText = m.kpisMet >= 4 ? 'On Track' : m.kpisMet >= 3 ? 'At Risk' : 'Below Target';
                            return `
                                <tr>
                                    <td><span class="property-name">${prop.name}</span></td>
                                    <td>${!isNaN(m.occupancy) ? m.occupancy.toFixed(1) + '%' : '—'}</td>
                                    <td>${!isNaN(m.collection) ? m.collection.toFixed(1) + '%' : '—'}</td>
                                    <td>${!isNaN(m.woOnTime) ? m.woOnTime.toFixed(1) + '%' : '—'}</td>
                                    <td>${!isNaN(m.turnaround) ? m.turnaround : '—'}</td>
                                    <td>${!isNaN(m.rgiOnTime) ? m.rgiOnTime.toFixed(1) + '%' : '—'}</td>
                                    <td><strong>${m.kpisMet}/5</strong></td>
                                    <td><span class="status-badge ${kpisMetStatus}">${statusText}</span></td>
                                </tr>
                            `;
                        }).join('')}
                    </tbody>
                </table>
            `;

            container.innerHTML = html;
        }

        function updateStatus(status) {
            const badge = document.getElementById('statusBadge');
            if (status === 'updating') {
                badge.classList.add('updating');
                badge.innerHTML = '<span class="dot"></span><span>Updating...</span>';
            } else if (status === 'live') {
                badge.classList.remove('updating');
                badge.innerHTML = '<span class="dot"></span><span>Live</span>';
            } else if (status === 'error') {
                badge.classList.add('updating');
                badge.innerHTML = '<span class="dot"></span><span>Error</span>';
            }
        }

        function showError(message) {
            document.getElementById('errorContainer').innerHTML = `<div class="error">${message}</div>`;
        }

        function clearError() {
            document.getElementById('errorContainer').innerHTML = '';
        }

        // Update "last updated" ticker
        setInterval(() => {
            if (lastLoadTime) {
                const diff = Math.floor((new Date() - lastLoadTime) / 1000);
                let timeText;
                if (diff < 60) timeText = 'just now';
                else if (diff < 3600) timeText = Math.floor(diff / 60) + 'm ago';
                else if (diff < 86400) timeText = Math.floor(diff / 3600) + 'h ago';
                else timeText = Math.floor(diff / 86400) + 'd ago';
                document.getElementById('lastUpdate').textContent = 'Last updated: ' + timeText;
            }
        }, 1000);
    </script>
</body>
</html>
